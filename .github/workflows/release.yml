name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(grep -E '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match pyproject version '${pkg}'"
            exit 1
          fi
          echo "Tag and pyproject version match: ${pkg}"

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution metadata
        run: |
          uv tool run --from twine twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/openreview-mcp
    permissions:
      id-token: write # OIDC for PyPI Trusted Publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract section from CHANGELOG
        id: changelog
        run: |
          tag="${GITHUB_REF_NAME#v}"
          # Pull the section between the matching version header and the next one.
          awk -v tag="$tag" '
            $0 ~ "^## \\[" tag "\\]" { found=1; next }
            found && $0 ~ "^## \\[" { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          echo "Notes for ${GITHUB_REF_NAME}:"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
          fail_on_unmatched_files: true
